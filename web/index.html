<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chika Pet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ffe58a, #ff9f1c 45%, #6f3600);
      color: #2b1600;
      padding: 18px;
      text-align: center;
    }
    .app { max-width: 430px; margin: 0 auto; }
    .card {
      background: rgba(255,255,255,.82);
      border-radius: 30px;
      padding: 22px;
      box-shadow: 0 20px 45px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    .note {
      background: rgba(255, 199, 44, .35);
      border-radius: 16px;
      padding: 10px;
      font-size: 13px;
      margin: 12px 0;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border: 0;
      border-radius: 18px;
      font-size: 16px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: 0;
      border-radius: 20px;
      font-size: 17px;
      font-weight: bold;
      background: #ff8500;
      color: white;
      box-shadow: 0 7px 0 #b85d00;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #b85d00;
    }
    .pet-wrap {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0;
    }
    #petGif {
      max-width: 180px;
      max-height: 180px;
      display: none;
      border-radius: 22px;
    }
    #petEmoji {
      font-size: 115px;
      animation: float 2s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
      100% { transform: translateY(0) rotate(-3deg); }
    }
    .bond {
      background: linear-gradient(135deg, #ffd84d, #ff9f1c);
      color: #3b2100;
      border-radius: 24px;
      padding: 14px;
      margin: 12px 0;
      font-size: 22px;
      font-weight: 900;
    }
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0;
    }
    .player {
      background: rgba(255,255,255,.75);
      border-radius: 20px;
      padding: 12px;
      font-weight: bold;
    }
    .ok { color: #159947; }
    .wait { color: #777; }
    .hidden { display: none; }
    .small { opacity: .75; font-size: 14px; }
    .danger { background: #d93636; box-shadow: 0 7px 0 #8f1e1e; }
    .admin { background: #222; box-shadow: 0 7px 0 #000; }
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>🐣 ChikaPad</h1>
    <div class="note">🚧 Сейчас используются временные анимации. Мы создаём фирменного Чику и собственный стикерпак.</div>

    <div id="setup">
      <p>Создай Чику с другом. Серия начнётся только когда друг присоединится.</p>
      <input id="petName" placeholder="Имя питомца, например Боба">
      <input id="friendName" placeholder="@username друга">
      <button onclick="createPet()">➕ Создать Чику</button>
      <button onclick="inviteFriend()">📨 Пригласить друга</button>
    </div>

    <div id="game" class="hidden">
      <div class="pet-wrap" ondblclick="petPet()">
        <img id="petGif" src="" alt="Chika animation">
        <div id="petEmoji">🥚</div>
      </div>

      <h2 id="petTitle">Чика</h2>
      <div class="bond">💛 Связь: <span id="bondDays">0</span> дней</div>
      <p id="statusText">Ждём друга.</p>

      <div class="players">
        <div class="player">Ты <span id="meStatus" class="wait">⏳</span></div>
        <div class="player">Друг <span id="friendStatus" class="wait">⏳</span></div>
      </div>

      <button onclick="feedMe()">🍗 Покормить</button>
      <button onclick="trainPet()">💪 Потренировать</button>
      <button onclick="petPet()">❤️ Погладить</button>
      <button onclick="inviteFriend()">📨 Позвать друга</button>

      <button class="admin" onclick="adminPanel()">⚙️ Admin test</button>
      <button class="danger" onclick="resetPet()">🗑 Сбросить тест</button>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) tg.expand();

  const ADMIN_USERNAME = "lukashuk2019";
  const tgUser = tg?.initDataUnsafe?.user;
  const username = tgUser?.username ? "@" + tgUser.username : "@test_user";

  let pet = JSON.parse(localStorage.getItem("chika_pet")) || null;

  const animations = {
    idle: "animations/idle.gif",
    happy: "animations/happy.gif",
    eat: "animations/eat.gif",
    train: "animations/train.gif",
    sleep: "animations/sleep.gif",
    dead: "animations/dead.gif",
    revive: "animations/revive.gif"
  };

  function save() {
    localStorage.setItem("chika_pet", JSON.stringify(pet));
  }

  function playAnimation(name, fallbackEmoji) {
    const img = document.getElementById("petGif");
    const emoji = document.getElementById("petEmoji");
    img.onerror = function() {
      img.style.display = "none";
      emoji.style.display = "block";
      emoji.innerText = fallbackEmoji || "🐣";
    };
    img.onload = function() {
      img.style.display = "block";
      emoji.style.display = "none";
    };
    img.src = animations[name] + "?t=" + Date.now();
  }

  function createPet() {
    const petName = document.getElementById("petName").value.trim() || "Чика";
    const friendName = document.getElementById("friendName").value.trim() || "@friend";

    pet = {
      name: petName,
      owner: username,
      friend: friendName,
      bond: 0,
      meFed: false,
      friendFed: false,
      joined: false,
      dead: false,
      lastDay: new Date().toDateString()
    };

    save();
    render();
    playAnimation("idle", "🥚");
  }

  function feedMe() {
    if (!pet) return;
    if (pet.dead) {
      alert("Чика умер. Используй восстановление.");
      playAnimation("dead", "💀");
      return;
    }

    pet.meFed = true;
    playAnimation("eat", "🍗");

    if (pet.friendFed || isAdmin()) {
      pet.bond += 1;
      pet.meFed = false;
      pet.friendFed = false;
      pet.joined = true;
      document.getElementById("statusText").innerText = "🎉 День засчитан! Чика счастлив.";
      playAnimation("happy", "🐣");
    } else {
      document.getElementById("statusText").innerText = "Ты покормил. Ждём друга.";
    }

    save();
    render();
  }

  function trainPet() {
    playAnimation("train", "💪");
    alert("💪 Чика потренировался!");
  }

  function petPet() {
    playAnimation("happy", "❤️");
    alert("❤️ Чика доволен!");
  }

  function inviteFriend() {
    const text = encodeURIComponent("🐣 Давай растить общего Чику и держать связь вместе!");
    const url = encodeURIComponent("https://t.me/ChikaStreakBot");
    window.open("https://t.me/share/url?url=" + url + "&text=" + text, "_blank");
  }

  function isAdmin() {
    return username.toLowerCase().includes(ADMIN_USERNAME.toLowerCase()) || username === "@test_user";
  }

  function adminPanel() {
    if (!isAdmin()) {
      alert("Админка доступна только владельцу.");
      return;
    }
    const action = prompt(
      "ADMIN:\n1 — друг покормил\n2 — +10 дней связи\n3 — убить Чику\n4 — воскресить Чику"
    );

    if (action === "1") pet.friendFed = true;
    if (action === "2") pet.bond += 10;
    if (action === "3") { pet.dead = true; playAnimation("dead", "💀"); }
    if (action === "4") { pet.dead = false; playAnimation("revive", "🐣"); }

    save();
    render();
  }

  function resetPet() {
    localStorage.removeItem("chika_pet");
    pet = null;
    render();
  }

  function render() {
    if (!pet) {
      document.getElementById("setup").classList.remove("hidden");
      document.getElementById("game").classList.add("hidden");
      return;
    }

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    document.getElementById("petTitle").innerText = pet.name;
    document.getElementById("bondDays").innerText = pet.bond;

    document.getElementById("meStatus").innerText = pet.meFed ? "✅" : "⏳";
    document.getElementById("friendStatus").innerText = pet.friendFed ? "✅" : "⏳";

    if (pet.dead) {
      document.getElementById("statusText").innerText = pet.name + " умер. Можно восстановить через админку.";
      playAnimation("dead", "💀");
      return;
    }

    if (!pet.joined) {
      document.getElementById("statusText").innerText = "Ждём друга. Серия ещё не началась.";
      playAnimation("idle", "🥚");
    } else if (pet.meFed) {
      document.getElementById("statusText").innerText = "Ты покормил. Ждём друга.";
    } else if (pet.friendFed) {
      document.getElementById("statusText").innerText = "Друг уже покормил. Теперь твоя очередь.";
    } else {
      document.getElementById("statusText").innerText = pet.name + " ждёт кормления.";
      playAnimation("idle", "🐣");
    }
  }

  render();
</script>
</body>
</html>
